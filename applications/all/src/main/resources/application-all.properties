##### Configurations for graal native image with all profile #####

store.account.enabled=true
store.account.balance-aggregation-enabled=true

store.account.address-balance-enabled=true
store.account.stake-address-balance-enabled=true

# Adapot aggregation properties
store.adapot.enabled=true
store.adapot.api-enabled=true
store.adapot.update-reward-db-batch-size=200

# Governance aggregation properties
store.governance-aggr.enabled=true
store.governance-aggr.api-enabled=true

store.epoch-aggr.enabled=true
store.epoch-aggr.api-enabled=true
store.epoch-aggr.epoch-calculation-interval=14400
store.epoch-aggr.epoch-calculation-enabled=true

store.live.enabled=true

store.admin.ui.enabled=true

# Assets-ext extension (CIP-26 + CIP-68 + CIP-113 token metadata)
# All flags off by default — enable the master flag plus the per-CIP flags you
# want at runtime via environment variables, --spring.profiles.active overrides,
# or by editing config/application.properties on the target machine.
# CIP-113 in particular is not yet officially live on mainnet.
store.assets.ext.enabled=false
store.assets.ext.cip26.enabled=false
store.assets.ext.cip68.enabled=false
store.assets.ext.cip113.enabled=false
