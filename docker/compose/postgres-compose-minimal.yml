services:
  yaci-store-postgres:
    image: postgres:17.4
    container_name: yaci-store-postgres-${INSTANCE_NAME:-default}
#    shm_size: 2g
    environment:
      - POSTGRES_USER=yaci
      - POSTGRES_PASSWORD=dbpass
      - POSTGRES_DB=yaci_store
      - POSTGRES_LOGGING=true
    ports:
      - "${YACI_STORE_DB_PORT:-54333}:5432"
    volumes:
      - $PWD/db-data/yaci-store/:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U yaci -d yaci_store'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "100"
