####################
# Enable analytics
####################
yaci.store.analytics.enabled=true
yaci.store.analytics.export-path=./data/analytics

# Buffer days before export (default: 2). Data older than this is exported to Parquet.
yaci.store.analytics.continuous-sync.buffer-days=1

# Defer analytics exports until node reaches chain tip (default: true)
#yaci.store.analytics.continuous-sync.export-after-sync=true

# Enable admin API for monitoring
yaci.store.analytics.admin.enabled=true

####################
# DuckDB configuration
####################

# Memory limit — MUST be set in production.
# DuckDB defaults to 80% of system RAM, which competes with the JVM heap.
# Recommended: 25-30% of system RAM (e.g., 2GB on an 8GB machine).
#yaci.store.analytics.duckdb.memory-limit=1GB

####################
# DuckLake storage
####################
yaci.store.analytics.storage.type=ducklake
yaci.store.analytics.ducklake.catalog-type=duckdb
yaci.store.analytics.ducklake.catalog-path=./data/analytics/ducklake.catalog.db

# PostgreSQL catalog (for production multi-instance deployments)
#yaci.store.analytics.ducklake.catalog-type=postgresql
#yaci.store.analytics.ducklake.catalog-url=jdbc:postgresql://localhost:5432/yaci_store
#yaci.store.analytics.ducklake.catalog-username=user
#yaci.store.analytics.ducklake.catalog-password=

# Compression settings
yaci.store.analytics.ducklake.export.codec=ZSTD
yaci.store.analytics.ducklake.export.compression-level=5
yaci.store.analytics.ducklake.export.row-group-size=-1

####################
# Query layer & MCP tools
####################

# Enable the analytics query API and MCP tools (DuckDB over Parquet + dedicated PG tools)
yaci.store.analytics.query.enabled=true

# MCP server (enabled by default, set to false to disable)
#yaci.store.mcp-server.enabled=false

# Disable REST API endpoints while keeping MCP tools active (default: true)
# Set to false for production — restricts analytics access to MCP only.
#yaci.store.analytics.query.rest-api-enabled=false

# PostgreSQL statement timeout for live balance queries (default: 30s)
#yaci.store.analytics.query.postgres-statement-timeout-seconds=30
